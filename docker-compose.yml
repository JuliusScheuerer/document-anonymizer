services:
  app:
    build: .
    container_name: document-anonymizer
    ports:
      - "8000:8000"
    env_file:
      - .env
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2
    pids_limit: 256
    tmpfs:
      - /tmp:size=100M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
