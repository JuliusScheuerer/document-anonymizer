<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-md font-semibold" style="font-family: 'Instrument Serif', 'Georgia', serif; font-size: 1.125rem;">Ergebnis</h3>
        <div class="stat-badge">
            {{ entities_found }} Entit&auml;t{{ "en" if entities_found != 1 else "" }} anonymisiert
            &middot; Strategie: {{ strategy }}
            &middot; {{ processing_time_ms }} ms
        </div>
    </div>

    <!-- Side-by-side diff view -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <h4 class="diff-heading">Original (mit Markierungen)</h4>
            <div class="diff-panel diff-original">{{ highlighted_original | safe }}</div>
        </div>
        <div>
            <h4 class="diff-heading">Anonymisiert</h4>
            <div class="diff-panel diff-anonymized">{{ anonymized_text }}</div>
        </div>
    </div>

    <div class="flex gap-2">
        <button
            id="copy-btn"
            class="btn btn-secondary text-sm"
        >
            Text kopieren
        </button>
        {% if is_pdf and pdf_b64 %}
        <form id="redact-pdf-form-download" method="post" action="/redact-pdf" class="inline">
            <input type="hidden" name="pdf_b64" value="{{ pdf_b64 }}">
            <input type="hidden" name="score_threshold" value="{{ score_threshold }}">
            <input type="hidden" name="selected_entities" value="{{ selected_entities }}">
            <button type="submit" class="btn btn-primary text-sm">
                PDF mit Schw&auml;rzungen herunterladen
            </button>
        </form>
        {% endif %}
    </div>
</div>
