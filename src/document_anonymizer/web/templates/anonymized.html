<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-md font-semibold">Ergebnis</h3>
        <div class="text-sm text-gray-500">
            {{ entities_found }} Entit&auml;t{{ "en" if entities_found != 1 else "" }} anonymisiert
            &middot; Strategie: {{ strategy }}
            &middot; {{ processing_time_ms }} ms
        </div>
    </div>

    <!-- Side-by-side diff view -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <h4 class="text-sm font-medium text-gray-600 mb-1">Original (mit Markierungen)</h4>
            <div class="diff-panel diff-original">{{ highlighted_original | safe }}</div>
        </div>
        <div>
            <h4 class="text-sm font-medium text-gray-600 mb-1">Anonymisiert</h4>
            <div class="diff-panel diff-anonymized">{{ anonymized_text }}</div>
        </div>
    </div>

    <div class="flex gap-2">
        <button
            id="copy-btn"
            onclick="copyAnonymizedText(this)"
            class="btn btn-secondary text-sm"
        >
            Text kopieren
        </button>
        {% if is_pdf and pdf_b64 %}
        <form method="post" action="/redact-pdf" class="inline">
            <input type="hidden" name="pdf_b64" value="{{ pdf_b64 }}">
            <input type="hidden" name="score_threshold" value="{{ score_threshold }}">
            <button type="submit" class="btn btn-primary text-sm">
                PDF mit Schwärzungen herunterladen
            </button>
        </form>
        {% endif %}
    </div>
    <script>
    function copyAnonymizedText(btn) {
        var text = document.querySelector('.diff-anonymized').textContent;
        var originalLabel = btn.textContent;
        function showFeedback() {
            btn.textContent = 'Kopiert!';
            setTimeout(function() { btn.textContent = originalLabel; }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(showFeedback);
        } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showFeedback();
        }
    }
    </script>
</div>
