{% extends "base.html" %}

{% block title %}{{ _("brand.name") }}{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="section-heading">{{ _("index.heading") }}</h1>
        <p class="section-subtitle">{{ _("index.subtitle") }}</p>
    </div>

    <form action="/detect" method="post" enctype="multipart/form-data" hx-post="/detect" hx-target="#results" hx-indicator="#loading" hx-encoding="multipart/form-data" class="warm-card p-4 space-y-4">
        <div>
            <div class="flex items-center justify-between mb-1">
                <label for="text" class="warm-label" style="margin-bottom: 0;">{{ _("index.text_label") }}</label>
                <a href="#" id="load-example-btn" class="text-xs example-link">{{ _("index.example_btn") }}</a>
            </div>
            <textarea
                id="text"
                name="text"
                rows="10"
                class="input-field w-full"
                placeholder="{{ _('index.placeholder') }}"
            ></textarea>
        </div>

        <div>
            <label for="file" class="warm-label">{{ _("index.file_label") }}</label>
            <input type="file" id="file" name="file" accept=".txt,.pdf" class="input-field">
        </div>

        <div class="flex items-end gap-4">
            <div>
                <label for="score_threshold" class="warm-label">
                    {{ _("index.threshold_label") }}
                </label>
                <div class="flex items-center gap-2">
                    <input
                        type="range"
                        id="score_threshold"
                        name="score_threshold"
                        min="0"
                        max="1"
                        step="0.05"
                        value="0.35"
                        class="w-48"
                    >
                    <span id="threshold-value" class="text-sm mono-text text-warm-500">0.35</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                {{ _("index.detect_btn") }}
            </button>
        </div>
    </form>

    <div id="loading" class="htmx-indicator text-center py-4">
        <div class="spinner"></div>
        <p class="text-sm mt-2 text-warm-500">{{ _("index.loading") }}</p>
    </div>

    <div id="results"></div>
</div>
{% endblock %}
