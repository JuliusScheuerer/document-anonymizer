{% extends "base.html" %}

{% block title %}Document Anonymizer{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="section-heading">Dokument anonymisieren</h1>
        <p class="section-subtitle">Text eingeben oder Datei hochladen. Alle Daten werden nur im Arbeitsspeicher verarbeitet &mdash; keine Persistenz.</p>
    </div>

    <form action="/detect" method="post" enctype="multipart/form-data" hx-post="/detect" hx-target="#results" hx-indicator="#loading" hx-encoding="multipart/form-data" class="warm-card p-4 space-y-4">
        <div>
            <div class="flex items-center justify-between mb-1">
                <label for="text" class="warm-label" style="margin-bottom: 0;">Text</label>
                <a href="#" id="load-example-btn" class="text-xs example-link">Beispieltext laden</a>
            </div>
            <textarea
                id="text"
                name="text"
                rows="10"
                class="input-field w-full"
                placeholder="Geben Sie hier den zu anonymisierenden Text ein...

Beispiel: Herr Max Mustermann, geboren am 15.03.1985, wohnhaft in 10115 Berlin, Musterstra&#223;e 42. IBAN: DE89 3704 0044 0532 0130 00. Steuer-ID: 12345679811. Tel: +49 30 12345678."
            ></textarea>
        </div>

        <div>
            <label for="file" class="warm-label">Oder Datei hochladen (TXT, PDF)</label>
            <input type="file" id="file" name="file" accept=".txt,.pdf" class="input-field">
        </div>

        <div class="flex items-end gap-4">
            <div>
                <label for="score_threshold" class="warm-label">
                    Konfidenzschwelle
                </label>
                <div class="flex items-center gap-2">
                    <input
                        type="range"
                        id="score_threshold"
                        name="score_threshold"
                        min="0"
                        max="1"
                        step="0.05"
                        value="0.35"
                        class="w-48"
                    >
                    <span id="threshold-value" class="text-sm mono-text text-warm-500">0.35</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                PII erkennen
            </button>
        </div>
    </form>

    <div id="loading" class="htmx-indicator text-center py-4">
        <div class="spinner"></div>
        <p class="text-sm mt-2 text-warm-500">Analysiere...</p>
    </div>

    <div id="results"></div>
</div>
{% endblock %}
