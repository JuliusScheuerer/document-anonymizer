name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run mypy src/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run bandit -r src/ -c pyproject.toml
      - name: Semgrep
        uses: docker://semgrep/semgrep:latest
        with:
          args: semgrep scan --config auto --error

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest --cov --cov-report=xml
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  compliance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest -m e2e
      - run: uv run pytest -m property
